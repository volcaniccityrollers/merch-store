<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2E2D32">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VCR Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <a href="/" class="logo">
      <img src="images/logo.png" alt="Volcanic City Rollers">
    </a>
    <button class="cart-toggle" id="cart-toggle" aria-label="Open cart">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 6L8.4 11h7.2l1.24-5H7.16zM5.21 4h13.58a1 1 0 0 1 .97 1.24l-1.68 6.73A1 1 0 0 1 17.11 13H8.89a1 1 0 0 1-.97-.76L5.68 3.51A1 1 0 0 0 4.72 3H3V1h1.72a3 3 0 0 1 2.91 2.27L5.21 4z"/></svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </header>

  <!-- Hero Banner -->
  <div class="hero-banner">
    <img src="images/hero.jpg" alt="Volcanic City Rollers">
  </div>

  <!-- Product Grid -->
  <h1 class="section-heading">Merch</h1>
  <main class="product-grid" id="product-grid"></main>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h2>Your Cart</h2>
      <button class="cart-close" id="cart-close" aria-label="Close cart">&times;</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span class="total-amount" id="cart-total">$0.00 NZD</span>
      </div>
      <button class="btn-primary" id="checkout-btn" style="width:100%">Checkout</button>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/cart.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
